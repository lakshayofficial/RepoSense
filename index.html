<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RepoSense</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 600px;
      background: #1e293b;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      margin-bottom: 20px;
    }

    .tagline {
      text-align: center;
      color: #94a3b8;
      margin-top: -10px;
      margin-bottom: 25px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2563eb;
    }

    .result {
      margin-top: 20px;
      padding: 20px;
      background: #111827;
      border-radius: 12px;
      display: none;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
    }

    .success {
      color: #4ade80;
    }

    .loading {
      margin-top: 15px;
      color: #93c5fd;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>📦 RepoSense</h1>
    <p class="tagline">
      know any public github repo size
    </p>

    <input type="text" id="repoUrl" placeholder="Paste GitHub Repo URL" />

    <button onclick="getRepoSize()">
      Find Repo Size
    </button>

    <div class="loading" id="loading"></div>

    <div class="result" id="result"></div>

    <div class="error" id="error"></div>
  </div>

  <script>
    function extractRepoDetails(url) {
      try {
        const parsedUrl = new URL(url);

        const parts = parsedUrl.pathname
          .split("/")
          .filter(Boolean);

        if (parts.length < 2) {
          return null;
        }

        return {
          owner: parts[0],
          repo: parts[1].replace(".git", "")
        };
      } catch {
        return null;
      }
    }

    async function getRepoSize() {
      const repoUrl = document.getElementById("repoUrl").value.trim();

      const resultDiv = document.getElementById("result");
      const errorDiv = document.getElementById("error");
      const loadingDiv = document.getElementById("loading");

      resultDiv.style.display = "none";
      errorDiv.innerHTML = "";
      loadingDiv.innerHTML = "Fetching repo details...";

      const details = extractRepoDetails(repoUrl);

      if (!details) {
        loadingDiv.innerHTML = "";
        errorDiv.innerHTML = "Invalid GitHub repo URL";
        return;
      }

      const { owner, repo } = details;

      try {
        const response = await fetch(
          `https://api.github.com/repos/${owner}/${repo}`
        );

        console.log(response);

        if (!response.ok) {
          throw new Error("Repo not found");
        }

        const data = await response.json();

        const sizeKB = data.size;
        const sizeMB = (sizeKB / 1024).toFixed(2);

        resultDiv.style.display = "block";

        resultDiv.innerHTML = `
          <p><strong>Owner:</strong> ${owner}</p>
          <p><strong>Repository:</strong> ${repo}</p>
          <p class="success">
            <strong>Repo Size:</strong>
            ${sizeKB} KB (${sizeMB} MB)
          </p>
        `;

        loadingDiv.innerHTML = "";

      } catch (error) {
        loadingDiv.innerHTML = "";
        errorDiv.innerHTML = error.message;
      }
    }
  </script>

</body>

</html>
